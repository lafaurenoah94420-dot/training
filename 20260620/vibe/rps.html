<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pierre-Feuille-Ciseaux — nahla.lol</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="rps.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body class="rps-page">
  <header class="top">
    <a href="index.html" class="logo">nahla<span class="dot">.</span>lol</a>
    <nav>
      <a href="index.html#games">← Retour aux jeux</a>
    </nav>
  </header>

  <main class="rps-main">
    <div class="rps-header">
      <img src="nahla_head.png" alt="" class="rps-logo" width="72" height="72">
      <h1>Pierre-Feuille-Ciseaux</h1>
      <p>Affronte Nahla. Elle triche peut-être. Elle s'en fout sûrement.</p>
    </div>

    <div class="rps-hud">
      <div class="hud-box">Toi : <span id="wins">0</span></div>
      <div class="hud-box">Égalités : <span id="ties">0</span></div>
      <div class="hud-box">Nahla : <span id="losses">0</span></div>
    </div>

    <div class="arena">
      <div class="fighter">
        <p class="fighter-label">Toi</p>
        <div id="player-choice" class="choice-emoji">❔</div>
      </div>
      <div class="vs">VS</div>
      <div class="fighter">
        <p class="fighter-label">Nahla</p>
        <div id="nahla-choice" class="choice-emoji nahla-pick">❔</div>
      </div>
    </div>

    <p id="result" class="result-msg">Choisis ta main.</p>
    <p id="nahla-quote" class="nahla-quote"></p>

    <div class="rps-buttons">
      <button type="button" class="rps-btn" data-choice="rock" aria-label="Pierre">
        <span class="btn-emoji">✊</span>
        <span>Pierre</span>
      </button>
      <button type="button" class="rps-btn" data-choice="paper" aria-label="Feuille">
        <span class="btn-emoji">✋</span>
        <span>Feuille</span>
      </button>
      <button type="button" class="rps-btn" data-choice="scissors" aria-label="Ciseaux">
        <span class="btn-emoji">✌️</span>
        <span>Ciseaux</span>
      </button>
    </div>

    <button id="reset-btn" class="btn-reset" type="button">Réinitialiser le score</button>
  </main>

  <script src="rps.js"></script>
</body>
</html>
